<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Taree Open</title>
</head>

<body>

<script>

  let appOpened = false;

  // 앱으로 이동하면 hidden 상태
  document.addEventListener("visibilitychange", () => {

    if (document.hidden) {
      appOpened = true;
    }

  });

  // 앱 실행 시도
  window.location.href =
    "intent://main#Intent;scheme=taree;package=cc.taree.app;end";

  // 브라우저 포커스 복귀 감지
  window.onfocus = function () {

    // 앱 안 열린 상태면 = 사용자가 취소 누른 것
    if (!appOpened) {

      window.location.href =
        "https://play.google.com/store/apps/details?id=cc.taree.app";

    }

  };

</script>

</body>
</html>
